name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT (or GitHub App token) required so tags created here trigger release.yml.
          # The default GITHUB_TOKEN does not fan out events to other workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
