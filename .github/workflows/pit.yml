name: pit

on:
  schedule:
    # Daily at 06:00 UTC. PIT is expensive; PR builds never run it.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Mutation testing
        # PIT failures must not break the schedule run; the report itself is the deliverable.
        continue-on-error: true
        run: ./mvnw -B -ntp -Ppit test

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: '**/target/pit-reports/**'
          if-no-files-found: ignore
          retention-days: 14
