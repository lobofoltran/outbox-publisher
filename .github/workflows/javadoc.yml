name: javadoc

# Publishes the aggregated Javadoc site to GitHub Pages after every tagged
# release. Runs only when the `release` workflow for the same tag finishes
# successfully, so a failed deploy can never overwrite Pages with stale docs.
on:
  workflow_run:
    workflows: ["release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  publish:
    # Run only when the upstream release workflow succeeded on a tag push.
    # `release.yml` itself is restricted to `tags: v*.*.*`, so a successful
    # workflow_run for it already implies a matching tag. We deliberately do
    # NOT inspect `workflow_run.head_branch` here: for tag-triggered runs the
    # GitHub API populates it with the branch the tagged commit lives on
    # (typically `main`) or with `null`, never with the tag name — which is
    # why a previous `startsWith(head_branch, 'v')` guard always skipped.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Need full history + tags so we can resolve the tag name from the SHA.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag name from head_sha
        id: tag
        run: |
          tag="$(git describe --tags --exact-match "${{ github.event.workflow_run.head_sha }}")"
          echo "name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Aggregate Javadoc
        run: ./mvnw -B -ntp -Prelease -DskipTests javadoc:aggregate

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/apidocs
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "docs: publish Javadoc for ${{ steps.tag.outputs.name }}"
