name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25 and GPG
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          # Configures ~/.m2/settings.xml so the deploy step can publish to GitHub Packages.
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          # Imports the CI signing key for maven-gpg-plugin.
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy signed artifacts to GitHub Packages (with aggregate SBOM)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        # `makeAggregateBom` writes target/bom.json + target/bom.xml at the reactor
        # root before `deploy` so the CycloneDX SBOM is reproducible alongside the
        # signed JARs. Plugin version is pinned via the parent's <pluginManagement>.
        run: |
          ./mvnw -B -ntp -Prelease -DskipTests \
            org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            deploy

      - name: Attach signed JARs and SBOM to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            **/target/*.jar
            **/target/*.jar.asc
            **/target/*-sources.jar
            **/target/*-sources.jar.asc
            **/target/*-javadoc.jar
            **/target/*-javadoc.jar.asc
            target/bom.json
            target/bom.xml
            docs/security/ci-pubkey.asc
          fail_on_unmatched_files: false
