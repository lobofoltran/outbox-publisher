name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 and GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          # Configures ~/.m2/settings.xml so the deploy step can publish to GitHub Packages.
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          # Imports the CI signing key for maven-gpg-plugin.
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy signed artifacts to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -ntp -Prelease -DskipTests deploy

      - name: Attach signed JARs to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            **/target/*.jar
            **/target/*.jar.asc
            **/target/*-sources.jar
            **/target/*-sources.jar.asc
            **/target/*-javadoc.jar
            **/target/*-javadoc.jar.asc
          fail_on_unmatched_files: false
